<div class="emoji-picker">
  <button type="button" class="emoji-trigger" [attr.aria-label]="label()" [attr.aria-expanded]="open()" (click)="toggle()">
    <span aria-hidden="true">☺</span>
  </button>

  @if (open()) {
    <div class="emoji-panel" role="dialog" aria-label="Emoji picker">
      <div class="emoji-grid">
        @for (code of codes; track code) {
          <button type="button" class="emoji-item" [attr.aria-label]="code" (click)="pick(code)">
            <img [src]="url(code)" [alt]="code" width="28" height="28" loading="lazy" />
          </button>
        }
      </div>
    </div>
  }
</div>
