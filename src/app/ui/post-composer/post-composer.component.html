<section class="composer page-enter">
  <app-avatar [pseudonym]="pseudonym()" [size]="40" />

  <div class="composer-main">
    <textarea
      #composerBox
      [(ngModel)]="content"
      rows="1"
      maxlength="280"
      placeholder="Write a post..."
      (input)="resize(composerBox)"
    ></textarea>

    <footer>
      <label class="attach" aria-label="attach file">
        <app-icon name="attach" [size]="18" />
        <input type="file" (change)="selectFile($event)" />
      </label>
      <button type="button" class="post" (click)="submit()">Post</button>
    </footer>

    @if (selectedFile) {
      <div class="selected-file">
        <span>{{ selectedFile.name }}</span>
        <button type="button" aria-label="remove attached file" (click)="removeFile()">×</button>
      </div>
    }
  </div>
</section>
